<!DOCTYPE html>
<html>

<head>

<title>TopperTimer Progress</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<h1>🔥 Study Progress</h1>

<div id="userBox" class="card"></div>

<div class="card">

<h3>🔥 Streak</h3>
<h2 id="streak">0</h2>

</div>

<div class="card">

<h3>🎮 Level</h3>
<h2 id="level">1</h2>

</div>

<div class="card">

<h3>📊 Total Study</h3>
<h2 id="time">0 min</h2>

</div>

<button id="openTimer">
⏱ Open TopperTimer
</button>

</div>

<script type="module" src="app.js"></script>

</body>

</html>
