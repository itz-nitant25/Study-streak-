<!DOCTYPE html>
<html>

<head>

<title>Study Streak</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Study Streak</h1>

<div class="card">

<h2>🔥 Current Streak</h2>

<h1 id="streak">0</h1>

<p>days</p>

</div>


<div class="card">

<h2>🎮 Level</h2>

<h1 id="level">1</h1>

<div class="xpbar">

<div id="xpfill"></div>

</div>

<p id="xptext">0 / 100 XP</p>

</div>


<div class="card">

<h2>📚 Add Study Time</h2>

<button id="addStudy">+30 Minutes Study</button>

</div>


<div class="card">

<button id="openTimer">Open TopperTimer</button>

</div>


<script type="module" src="app.js"></script>

</body>
</html>
